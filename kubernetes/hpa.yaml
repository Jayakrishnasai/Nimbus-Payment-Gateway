# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HPA — Backend
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nimbuscart-backend-hpa
  namespace: payment-ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nimbuscart-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HPA — Frontend
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nimbuscart-frontend-hpa
  namespace: payment-ecom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nimbuscart-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PodDisruptionBudget
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nimbuscart-backend-pdb
  namespace: payment-ecom
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nimbuscart-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nimbuscart-frontend-pdb
  namespace: payment-ecom
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nimbuscart-frontend
