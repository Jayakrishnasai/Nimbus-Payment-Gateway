apiVersion: v1
kind: Namespace
metadata:
  name: payment-ecom
  labels:
    app.kubernetes.io/part-of: nimbuscart
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Backend Deployment
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbuscart-backend
  namespace: payment-ecom
  labels:
    app: nimbuscart-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nimbuscart-backend
  template:
    metadata:
      labels:
        app: nimbuscart-backend
    spec:
      serviceAccountName: nimbuscart-backend
      containers:
        - name: backend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/nimbuscart-backend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: nimbuscart-config
            - secretRef:
                name: nimbuscart-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Frontend Deployment
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nimbuscart-frontend
  namespace: payment-ecom
  labels:
    app: nimbuscart-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nimbuscart-frontend
  template:
    metadata:
      labels:
        app: nimbuscart-frontend
    spec:
      containers:
        - name: frontend
          image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/nimbuscart-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Services
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: v1
kind: Service
metadata:
  name: nimbuscart-backend
  namespace: payment-ecom
spec:
  type: ClusterIP
  selector:
    app: nimbuscart-backend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: nimbuscart-frontend
  namespace: payment-ecom
spec:
  type: ClusterIP
  selector:
    app: nimbuscart-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Service Account (IRSA)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nimbuscart-backend
  namespace: payment-ecom
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/nimbuscart-backend
